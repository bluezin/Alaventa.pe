providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = [
  'corepack enable',
  'corepack prepare pnpm@11.2.2 --activate',
  'pnpm install --frozen-lockfile --ignore-scripts',
  'pnpm rebuild',
]

[phases.build]
cmds = ['pnpm --filter @workspace/api-server build']

[start]
cmd = 'pnpm --filter @workspace/api-server start'
